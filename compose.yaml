services:
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: gitlab-postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Taipei
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_admin_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - max_connections=200
      - -c
      - shared_buffers=512MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB
    shm_size: "1gb"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data:Z
    secrets:
      - postgres_admin_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - gitlab-network

  gitlab:
    image: ${GITLAB_IMAGE}
    container_name: gitlab
    hostname: ${GITLAB_HOSTNAME}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: Asia/Taipei
      GITLAB_OMNIBUS_CONFIG: |
        external_url '${GITLAB_EXTERNAL_URL}'

        postgresql['enable'] = false
        gitlab_rails['db_adapter'] = 'postgresql'
        gitlab_rails['db_encoding'] = 'unicode'
        gitlab_rails['db_host'] = 'postgres'
        gitlab_rails['db_port'] = 5432
        gitlab_rails['db_database'] = 'gitlabhq_production'
        gitlab_rails['db_username'] = 'gitlab'
        gitlab_rails['db_password'] = File.read('/run/secrets/gitlab_db_password').strip

        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_SSH_PORT}
        gitlab_rails['time_zone'] = 'Taipei'
        gitlab_rails['backup_keep_time'] = 1209600

        letsencrypt['enable'] = false
        nginx['listen_port'] = 80
        nginx['listen_https'] = false

        puma['worker_processes'] = ${GITLAB_PUMA_WORKERS}
        puma['min_threads'] = 4
        puma['max_threads'] = 4
        sidekiq['concurrency'] = ${GITLAB_SIDEKIQ_CONCURRENCY}

        prometheus_monitoring['enable'] = false
        alertmanager['enable'] = false
    ports:
      - "${GITLAB_HTTP_PORT}:80"
      - "${GITLAB_SSH_PORT}:22"
    volumes:
      - ./gitlab/config:/etc/gitlab:Z
      - ./gitlab/logs:/var/log/gitlab:Z
      - ./gitlab/data:/var/opt/gitlab:Z
    secrets:
      - gitlab_db_password
    shm_size: "256m"
    stop_grace_period: 5m
    healthcheck:
      test: ["CMD", "/opt/gitlab/bin/gitlab-healthcheck", "--fail", "--max-time", "10"]
      interval: 30s
      timeout: 15s
      retries: 40
      start_period: 10m
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - gitlab-network

  gitlab-runner:
    image: ${RUNNER_IMAGE}
    container_name: gitlab-runner
    restart: unless-stopped
    environment:
      TZ: Asia/Taipei
    volumes:
      - ./runner/config:/etc/gitlab-runner:Z
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - label=disable
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - gitlab-network

networks:
  gitlab-network:
    name: gitlab-network
    driver: bridge

secrets:
  postgres_admin_password:
    file: ./secrets/postgres_admin_password.txt
  gitlab_db_password:
    file: ./secrets/gitlab_db_password.txt
